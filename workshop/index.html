<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://code.jquery.com/jquery-3.2.1.min.js"></script>

    <title>Workshop | How to Coding</title>
    <style type="text/css">
      .library iframe {
        border:0;
        width:100%; height:100%;
      }
      .library::-webkit-scrollbar,
      .library li::-webkit-scrollbar{
        width: 0.25rem;
        height: 2.5vh;
        background: blue;
      }
      .library::-webkit-scrollbar-track,
      .library li::-webkit-scrollbar-track{
        border: none;
      }
      .library::-webkit-scrollbar-thumb,
      .library li::-webkit-scrollbar-thumb{
        background: #fff;
        border: none;
      }

    </style>

    <meta
      name="description"
      content="https://www.it-the-best.com/entry/javascript-technic-mousedragscroll"
    />

    <!-- Import the webpage's stylesheet -->
    <link rel="stylesheet" href="http://creative-community.pe.hu/coding/js/mousedragscrollable/scrollable.css" />

    <!-- Import the webpage's javascript file -->
    <script src="http://creative-community.pe.hu/coding/js/mousedragscrollable/scrollable.js"></script>

  </head>
  <body>
    <ul class="mousedragscrollable library">
      <li><iframe src="basic.php"></iframe></li>
    </ul>
  </body>

  <script>$(".mousedragscrollable").mousedragscrollable();</script>

</html>
