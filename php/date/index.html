<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title> Date/Time | Personal Home Page Tools </title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="/coding/js/randomcolor.js"></script>
    <script src="/coding/hello/open_close.js"></script>
    <script type="text/javascript">
        $(function() {
            jQuery('#right').css({
                'background': getRumRgba()
            });
        });

        $(function() {
            $("#hello").load("hello.php");
            $("#about").load("about.html");
            $("#about_php").load("/coding/php/about.html");
            $("#mobile").load("/coding/mobile.html");
        })
    </script>
    <link rel="stylesheet" href="/coding/cover/style.css" />
    <link rel="stylesheet" href="/coding/submit/form.css" />
    <link rel="stylesheet" href="/coding/hello/about.css" />
    <link rel="stylesheet" href="/coding/hello/close_open.css" />
    <style type="text/css">
        @font-face {
            font-family: "NewYork";
            src: url("/coding/fontbook/NewYork.otf");
        }
        
        #title {
            font-family: "NewYork";
        }
        
        #main,
        #order {
            zoom: 1.5;
        }
        
        #sample {
            border: solid 0.1vw;
            padding: 2.5%;
            width: 90%;
        }
        
        #mobile {
            display: none;
        }
        
        @media screen and (max-width: 900px) {
            #left #hello,
            #left #about_php,
            #right #about {
                display: none;
            }
            #mobile {
                display: block;
                position: fixed;
                padding: 0;
                margin: 0;
                width: 100%;
                height: 100vh;
                top: 0;
                left: 0;
            }
        }
    </style>
</head>

<body>
    <h1 id="title">Date/Time | Personal Home Page Tools</h1>
    <div id="cover">
        <div id="left">
            <div id="about_php"></div>
            <div id="hello"></div>
            <div id="mobile"></div>
        </div>
        <div id="right">
            <div id="about"></div>
        </div>
    </div>
</body>

</html>
