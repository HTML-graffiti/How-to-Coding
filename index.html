<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="description" content="このウェブサイトは、ウェブサイトの作り方をまとめたウェブサイトです。">

    <title> How to Coding | creative-community.space </title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="js/randomcolor.js"></script>
    <script type="text/javascript">
        $(function() {
            jQuery('#left').css({
                'background': getRumRgba()
            });
            jQuery('#right').css({
                'background': getRumRgba()
            });
        });

        $(function() {
            $("#greeting").load("hello.html");
            $("#update").load("update/about.html");
            $("#html").load("html/basic.html");
            $("#css").load("css/library.html");
            $("#order").load("submit/order/form.html");
            $("#mobile").load("mobile.html");
        })
    </script>
    <link rel="stylesheet" href="cover/style.css" />
    <link rel="stylesheet" href="css/popup.css" />
    <link rel="stylesheet" href="hello/close_open.css" />
    <style type="text/css">
        @font-face {
            font-family: "NewYork";
            src: url("fontbook/NewYork.otf");
        }
        
        #title,
        .NewYork {
            font-family: "NewYork";
        }
        
        #left {
            overflow-x: hidden;
        }
        
        #order {
            padding-bottom: 2vw;
        }
        
        #mobile {
            display: none;
        }
        
        @media screen and (max-width: 900px) {
            #left #greeting,
            #left #order,
            #right #hello {
                display: none;
            }
            #mobile {
                display: block;
                position: fixed;
                padding: 0;
                margin: 0;
                width: 100%;
                height: 100vh;
                top: 0;
                left: 0;
            }
        }
    </style>
</head>

<body>
    <h1 id="title">How to Coding | creative-community.space</h1>
    <div id="cover">
        <div id="left">
            <div id="greeting"></div>
            <div id="mobile"></div>
        </div>
        <div id="right">
            <div id="update"></div>
            <div id="hello">
                <div id="html"></div>
                <div id="css"></div>
            </div>
            <div id="order"></div>
        </div>
    </div>

    <div class="popup" id="contactform" style="display:none;">
        <p><iframe src="submit/order/"></iframe></p>
        <span class="close" onclick="obj=document.getElementById('contactform').style; obj.display=(obj.display=='none')?'block':'none';">✕</span>
    </div>
</body>

</html>
