<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> The Greeting Page that seems like reading a book </title>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
<script src="../js/randomcolor.js"></script>
<script type="text/javascript">
$(function(){
    jQuery('#left').css({'background':getRumRgba()});
    jQuery('#right').css({'background':getRumRgba()});
})
$(function(){
    $("#sample").load("sample.html");
    $("#html").load("html.html");
    $("#howto").load("howto.html");
    $("#mobile").load("../mobile.html");
    $("#template").load("../cover/org.html");
	$("#order").load("../submit/order/form.html");
})
</script>

<link rel="stylesheet" href="../cover/style.css"/>
<link rel="stylesheet" href="about.css"/>
<link rel="stylesheet" href="../css/popup.css"/>

<style type="text/css">
@font-face {
  font-family: "NewYork";
  src: url("/coding/fontbook/NewYork.otf");
}
#title {font-family:"NewYork";}
#mobile {display:none;}

@media screen and (max-width: 900px){
#left #sample,
#left #html,
#right
 {display:none;}
#mobile {
  display:block;
  position:fixed;
  padding:0; margin:0;
  width:100%; height:100vh;
  top:0; left:0;
}
}
</style>
</head>
<body>
<h1 id="title">Greeting Page | How to Coding</h1>
<div id="cover">
<div id="left">
<div id="sample"></div>
<div id="html"></div>
<div id="mobile"></div>
</div>
<div id="right">
<div id="howto"></div>
<div id=contacts">
<div id="template"></div>
</div>
<div id="order"></div>
</div>
</div>
<div class="popup" id="support" style="display:none;">
<p><iframe src="/support/"></iframe></p>
<span class="close" onclick="obj=document.getElementById('support').style; obj.display=(obj.display=='none')?'block':'none';">✕</span>
</div>
<div class="popup" id="contactform" style="display:none;">
<p><iframe src="/coding/submit/order/"></iframe></p>
<span class="close" onclick="obj=document.getElementById('contactform').style; obj.display=(obj.display=='none')?'block':'none';">✕</span>
</div>
</body>
</html>
