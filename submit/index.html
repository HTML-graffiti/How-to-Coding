<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="ie=edge">
<meta name="description" content="3つの PHPファイル contents.php submit.php complete.php を使用し、リストページ／投稿フォームを作ります。">

<title> Let's Creat a Lists of the Things about You </title>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
<script src="../js/randomcolor.js"></script>
<script type="text/javascript">
$(function(){
	jQuery('#left').css({'background':getRumRgba()});
	jQuery('#right').css({'background':getRumRgba()});
});

$(function(){
    $("#hello").load("hello.html");
    $("#about").load("about.html");
    $("#contents").load("contents.php");
    $("#mobile").load("../mobile.html");
    $("#order").load("../submit/order/form.html");
    $("#php_index").load("../php/about.html");
    $("#template").load("../cover/org.html");
})
</script>
<link rel="stylesheet" href="../cover/style.css"/>
<link rel="stylesheet" href="form.css"/>
<link rel="stylesheet" href="../css/popup.css"/>
<style type="text/css">
@font-face {
  font-family: "NewYork";
  src: url("../fontbook/NewYork.otf");
}
#title {font-family:"NewYork";}
#mobile {display:none;}

@media screen and (max-width: 900px){
#left #hello,
#left #php_index,
#left #about,
#right
{display:none;}

#mobile {
  display:block;
  position:fixed;
  padding:0; margin:0;
  width:100%; height:100vh;
  top:0; left:0;
}
}
</style>
</head>
<body>
<h1 id="title">Let's Creat a Lists of the Things about You</h1>
<div id="cover">
<div id="left">
<div id="hello"></div>
<div id="about"></div>
<div id="php_index"></div>
<div id="mobile"></div>
</div>
<div id="right">
<div id="contents"></div>
<div id="template"></div>
<div id="order"></div>
</div>
</div>

<div class="popup" id="contactform" style="display:none;">
<p><iframe src="../submit/order/"></iframe></p>
<span class="close" onclick="obj=document.getElementById('contactform').style; obj.display=(obj.display=='none')?'block':'none';">✕</span>
</div>
<div class="popup" id="support" style="display:none;">
<p><iframe src="/support/"></iframe></p>
<span class="close" onclick="obj=document.getElementById('support').style; obj.display=(obj.display=='none')?'block':'none';">✕</span>
</div>
</body>
</html>
