<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="ie=edge">
<title> Form | HyperText Markup Languagehu </title>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
<script src="/coding/js/randomcolor.js"></script>
<script type="text/javascript">
$(function(){
	jQuery('a').css({'background':getRumRgba()});
	jQuery('#right').css({'background':getRumRgba()});
});

$(function(){
    $("#form").load("form.html");
    $("#about").load("about.html");
    $("#link").load("/coding/submit/about.html");
		$("#order").load("/coding/submit/order/form.html");
    $("#html_link").load("/coding/html/link.html");
})
</script>
<link rel="stylesheet" href="/coding/cover/style.css"/>
<link rel="stylesheet" href="/coding/css/popup.css"/>
<style type="text/css">
@font-face {
  font-family: "NewYork";
  src: url("/coding/fontbook/NewYork.otf");
}
#title {font-family:"NewYork";}
#left {overflow-x:hidden;}
.support {
  font-size:1.25vw;
  padding:0.5% 2.5%;
  margin:5% 0 10%;
}
.support a {
  text-decoration:none;
  color:#000;
  cursor:pointer;
  padding:0.5vw 1.5vw;
  margin:0.5vw;
  line-height:4vw;
  border:0.1vw solid;
  border-radius:2.5rem;
}

@media screen and (max-width: 500px){
.support {zoom:0.75;}
}
</style>
</head>
<body>
<h1 id="title">Form | HyperText Markup Language</h1>
<div id="cover">
<div id="left">
<div id="form"></div>
<div id="html_link"></div>
</div>
<div id="right">
<div id="about"></div>
<div id="link"></div>
<div id="order"></div>
</div>
</div>
<div class="popup" id="contactform" style="display:none;">
<p><iframe src="/coding/submit/order/"></iframe></p>
<span class="close" onclick="obj=document.getElementById('contactform').style; obj.display=(obj.display=='none')?'block':'none';">✕</span>
</div>
</body>
</html>
