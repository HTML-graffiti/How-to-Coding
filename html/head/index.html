<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="作者名">
    <meta name="description" content="ページの説明">

    <title> HEAD | HyperText Markup Language </title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script type="text/javascript">
        $(function() {
            $("#demo").load("hello.html");
            $("#howto").load("howto.html");
            $("#html_link").load("../../html/basic.html");
            $("#mobile").load("/coding/mobile.html");
        })
    </script>
    <link rel="stylesheet" href="../../cover/style.css" />
    <link rel="stylesheet" href="../../css/popup.css" />
    <style type="text/css">
        @font-face {
            font-family: "NewYork";
            src: url("../../fontbook/NewYork.otf");
        }
        
        #title {
            font-family: "NewYork";
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        #mobile {
            display: none;
        }
        
        @media screen and (max-width: 900px) {
            #left #demo,
            #left #html_link,
            #right {
                display: none;
            }
            #mobile {
                display: block;
                position: fixed;
                padding: 0;
                margin: 0;
                width: 100%;
                height: 100vh;
                top: 0;
                left: 0;
            }
        }
    </style>
</head>

<body>
    <h1 id="title">HEAD | HyperText Markup Language</h1>
    <div id="cover">
        <div id="left">
            <div id="demo"></div>
            <div id="html_link"></div>
            <div id="mobile"></div>
        </div>
        <div id="right">
            <div id="howto"></div>
            <div id="contents">
                <p class="support">Support
                    <a onclick="obj=document.getElementById('support').style; obj.display=(obj.display=='none')?'block':'none';">Donation</a>
                </p>
            </div>
        </div>
    </div>
    <div class="popup" id="support" style="display:none;">
        <p><iframe src="/support/"></iframe></p>
        <span class="close" onclick="obj=document.getElementById('support').style; obj.display=(obj.display=='none')?'block':'none';">✕</span>
    </div>
</body>

</html>
