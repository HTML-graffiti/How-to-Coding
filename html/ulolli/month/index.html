<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="ie=edge">
<title> Calendar | Ul Ol Li </title>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
<script src="/coding/js/randomcolor.js"></script>
<script type="text/javascript">
$(function(){
	jQuery('#right').css({'background':getRumRgba()});
});

$(function(){
    $("#calendar").load("contents.php");
    $("#about").load("about.html");
    $("#html_ulolli").load("../menu.html ");
    $("#html_link").load("/coding/html/link.html");
    $("#order").load("../../../submit/order/form.html");
    $("#mobile").load("/coding/mobile.html");
})
</script>
<link rel="stylesheet" href="../../../cover/style.css"/>
<link rel="stylesheet" href="../../../css/popup.css"/>
<link rel="stylesheet" href="../../../hello/about.css"/>
<style type="text/css">
@font-face {
  font-family: "NewYork";
  src: url("/coding/fontbook/NewYork.otf");
}
#title {font-family:"NewYork";}
.support {
  font-size:1.25vw;
  padding:0.5% 2.5%;
  margin:5% 0 10%;
}
.support a {
  text-decoration:none;
  color:#000;
  cursor:pointer;
  padding:0.5vw 1.5vw;
  margin:0.5vw;
  line-height:4vw;
  border:0.1vw solid;
  border-radius:2.5rem;
}
#mobile {display:none;}

@media screen and (max-width: 900px){
#left #html_ulolli,
#left #calendar,
#right
{display:none;}

#mobile {
  display:block;
  position:fixed;
  padding:0; margin:0;
  width:100%; height:100vh;
  top:0; left:0;
}
}

</style>
</head>
<body>
<h1 id="title">Calendar | Ul Ol Li</h1>
<div id="cover">
<div id="left">
<div id="html_ulolli"></div>
<div id="calendar"></div>
<div id="mobile"></div>
</div>
<div id="right">
<div id="about"></div>
<div id="html_link"></div>
<div id="order"></div>
</div>
</div>
<div class="popup" id="contactform" style="display:none;">
<p><iframe src="/coding/submit/order/"></iframe></p>
<span class="close" onclick="obj=document.getElementById('contactform').style; obj.display=(obj.display=='none')?'block':'none';">✕</span>
</div>
</body>
</html>
