<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="description" content="ベーステキストの上、下、隣に描画される小さな注釈をつけるルビ要素を解説します。">
    <title> Ruby | HyperText Markup Language </title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="/coding/js/randomcolor.js"></script>
    <script type="text/javascript">
        $(function() {
            jQuery('#right').css({
                'background': getRumRgba()
            });
        });

        $(function() {
            $("#howto").load("howto.html");
            $("#demo").load("hello.html");
            $("#html_link").load("/coding/html/basic.html");
            $("#mobile").load("/coding/mobile.html");
        })
    </script>
    <link rel="stylesheet" href="ruby.css" />
    <link rel="stylesheet" href="/coding/cover/style.css" />
    <link rel="stylesheet" href="/coding/css/popup.css" />
    <style type="text/css">
        @font-face {
            font-family: "NewYork";
            src: url("/coding/fontbook/NewYork.otf");
        }
        
        #title {
            font-family: "NewYork";
        }
        
        #mobile {
            display: none;
        }
        
        @media screen and (max-width: 900px) {
            #left #demo,
            #left #html_link,
            #right {
                display: none;
            }
            #mobile {
                display: block;
                position: fixed;
                padding: 0;
                margin: 0;
                width: 100%;
                height: 100vh;
                top: 0;
                left: 0;
            }
        }
    </style>
</head>

<body>
    <h1 id="title">Ruby | HyperText Markup Language</h1>
    <div id="cover">
        <div id="left">
            <div id="demo"></div>
            <div id="html_link"></div>
            <div id="mobile"></div>
        </div>
        <div id="right">
            <div id="howto"></div>
            <div id="contents">
                <div id="hello">
                    <p class="support">Support
                        <a onclick="obj=document.getElementById('support').style; obj.display=(obj.display=='none')?'block':'none';">Donation</a>
                    </p>
                    <br/>
                </div>
            </div>
        </div>
    </div>
    <div class="popup" id="support" style="display:none;">
        <p><iframe src="/support/"></iframe></p>
        <span class="close" onclick="obj=document.getElementById('support').style; obj.display=(obj.display=='none')?'block':'none';">✕</span>
    </div>
</body>

</html>
