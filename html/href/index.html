<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="ie=edge">
<meta name="description" content="このページでは、別のウェブページ、ファイル、メールアドレス、同一ページ内の要素へのハイパーリンクを作成する A: アンカー要素 と、要素に特定の名前をつけるグローバル属性と呼ばれるHTML言語 CLASS と ID についてを解説します。">

<title> A CLASS ID | HyperText Markup Language </title>
<link rel="stylesheet" href="style.css"/>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
<script type="text/javascript">
$(function(){
    $("#demo").load("hello.html");
    $("#howto").load("howto.html");
    $("#html_link").load("../../html/link.html");
    $("#order").load("../../submit/order/form.html");
    $("#mobile").load("/coding/mobile.html");
})
</script>
<link rel="stylesheet" href="../../cover/style.css"/>
<link rel="stylesheet" href="../../css/popup.css"/>
<style type="text/css">
@font-face {
  font-family: "NewYork";
  src: url("/coding/fontbook/NewYork.otf");
}
#title {font-family:"NewYork";}
html {scroll-behavior: smooth;}
#mobile {display:none;}

@media screen and (max-width: 900px){
#left #demo,
#right
{display:none;}

#mobile {
  display:block;
  position:fixed;
  padding:0; margin:0;
  width:100%; height:100vh;
  top:0; left:0;
}
}
</style>
</head>
<body>
<h1 id="title">A CLASS ID | HyperText Markup Language</h1>
<div id="cover">
<div id="left">
<div id="demo"></div>
<div id="mobile"></div>
</div>
<div id="right">
<div id="howto"></div>
<div id="html_link"></div>
<div id="contents">
<p class="support">Support
<a onclick="obj=document.getElementById('support').style; obj.display=(obj.display=='none')?'block':'none';">Donation</a>
</p>
</div>
<div id="order"></div>
</div>
</div>
<div class="popup" id="contactform" style="display:none;">
<p><iframe src="/coding/submit/order/"></iframe></p>
<span class="close" onclick="obj=document.getElementById('contactform').style; obj.display=(obj.display=='none')?'block':'none';">✕</span>
</div>
<div class="popup" id="support" style="display:none;">
<p><iframe src="/support/"></iframe></p>
<span class="close" onclick="obj=document.getElementById('support').style; obj.display=(obj.display=='none')?'block':'none';">✕</span>
</div>
</body>
</html>
