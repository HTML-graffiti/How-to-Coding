<!DOCTYPE html>
<html lang="ja">
<head>
<title>A CLASS ID | HyperText Markup Language</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css"/>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
<script src="/coding/js/randomrgba.js"></script>
<script type="text/javascript">

$(function(){
	jQuery('.randombg').css({'background':getRumRgba()});
});

$(function(){
	jQuery('.randomcolor').css({'color':getRumRgba()});
})

</script>
<style>
html {scroll-behavior: smooth;}
</style>
</head>
<body>
  <a href="/coding/html/href/howto.html" target="_blank" rel="noopener noreferrer">A</a>
  <p id="click">
    <a id="one" class="none" href="#two">click</a>
    <a id="two" class="randomcolor border" href="#three">click</a>
    <a id="three" class="randombg" href="#four">click</a>
    <a id="four" class="border none" href="#five">click</a>
    <a id="five" class="randomcolor randombg radius none" href="#one">click</a>
  </p>

<!-- スムーズスクロール部分の記述 -->
<script>
$(function(){
   // #で始まるアンカーをクリックした場合に処理
   $('a[href^=#]').click(function() {
      // スクロールの速度
      var speed = 1000; // ミリ秒
      // アンカーの値取得
      var href= $(this).attr("href");
      // 移動先を取得
      var target = $(href == "#" || href == "" ? 'html' : href);
      // 移動先を数値で取得
      var position = target.offset().top;
      // スムーススクロール
      $('body,html').animate({scrollTop:position}, speed, 'swing');
      return false;
   });
});
</script>
</body>
</html>
