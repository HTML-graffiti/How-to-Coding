<!DOCTYPE html>
<html lang="ja">

<head>
    <title>A CLASS ID | HyperText Markup Language</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
</head>

<body>
    <p id="click">
        <a id="one" class="shadow" href="#two">click</a>
        <a id="two" class="solid none radius" href="#three">click</a>
        <a id="three" class="double shadow" href="#four">click</a>
        <a id="four" class="dotted radius none" href="#five">click</a>
        <a id="five" class="radius none shadow" href="#one">click</a>
    </p>
</body>

</html>
