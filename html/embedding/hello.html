<!DOCTYPE html>
<html lang="ja">
<head>
<title>Multimedia and embedding | HyperText Markup Language</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="このページでは、HTMLにマルチメディアを含める方法を解説します。">
</head>

<body>
<p><a href="hello.html">HTMLのみ（CSSをリンクしない場合）の表示を見る</a></p>

<img class="grayscale" src="" alt="img alt">
<img class="sepia" src="" alt="img alt">
<img class="contrast" src="" alt="img alt">

<video src="/sign/view.mp4" loop autoplay muted></video>

<audio controls>
  <source src="" type="audio/mp3">
  Sorry, your browser doesn't support embedded Audios.
</audio>

<iframe src="hello.html">
  Sorry, your browser doesn't support embedded iframe.
</iframe>

<object data="/sign/beta.pdf" type="application/pdf" typemustmatch>
  Sorry, your browser doesn't support embedded odject.
</object>

</body>
</html>
