<!DOCTYPE html>
<html lang="ja">

<head>
    <title>Multimedia and embedding | HyperText Markup Language</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="このページでは、HTMLにマルチメディアを含める方法を解説します。">
</head>

<body>

    <img class="grayscale" src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/08/Digiscope_-_20x_-_24mm_-_Ystad-2021.jpg/800px-Digiscope_-_20x_-_24mm_-_Ystad-2021.jpg" alt="img alt">
    <img class="sepia" src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/08/Digiscope_-_20x_-_24mm_-_Ystad-2021.jpg/800px-Digiscope_-_20x_-_24mm_-_Ystad-2021.jpg" alt="img alt">
    <img class="contrast" src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/08/Digiscope_-_20x_-_24mm_-_Ystad-2021.jpg/800px-Digiscope_-_20x_-_24mm_-_Ystad-2021.jpg" alt="img alt">

    <video src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.webm" loop autoplay muted></video>

    <audio controls>
      <source src="https://interactive-examples.mdn.mozilla.net/media/cc0-audio/t-rex-roar.mp3" type="audio/mp3">
      Sorry, your browser doesn't support embedded Audios.
    </audio>

    <iframe src="hello.html">
      Sorry, your browser doesn't support embedded iframe.
    </iframe>

    <object type="application/pdf" data="https://interactive-examples.mdn.mozilla.net/media/examples/In-CC0.pdf" typemustmatch>
      Sorry, your browser doesn't support embedded odject.
    </object>

</body>

</html>
