<!DOCTYPE html>
<html lang="ja">
<head>
<title>DIV SPAN | HyperText Markup Language</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div class="pc">div class="pc"</div>
<span class="pc">span class="pc"</span>

<div class="mobile">div class="mobile"</div>
<span class="mobile">span class="mobile"</span>

<div class="both">div class="both"
  <span class="both">span class="both"</span>
  <span class="pc">span class="pc"</span>
  <span class="mobile">span class="mobile"</span>
</div>

<div class="pc">div class="pc"
  <span class="both">span class="both"</span>
  <span class="pc">span class="pc"</span>
  <span class="mobile">span class="mobile"</span>
</div>

<div class="mobile">div class="mobile"
  <span class="both">span class="both"</span>
  <span class="pc">span class="pc"</span>
  <span class="mobile">span class="mobile"</span>
</div>

</body>
</html>
