<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="description" content="代表的なテキスト要素を並べたHTMLのフォントをスタイリングするCSSを解説します。">
    <title> Font | Cascading Style Sheets </title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="/coding/js/randomcolor.js"></script>
    <script type="text/javascript">
        $(function() {
            jQuery('#right').css({
                'background': getRumRgba()
            });
        });

        $(function() {
            $("#howto").load("howto.html");
            $("#demo").load("../../html/text/hello.html");
            $("#css_library").load("../library.html");
            $("#mobile").load("/coding/mobile.html");
        })
    </script>
    <link rel="stylesheet" href="font.css" />
    <link rel="stylesheet" href="fontmotion.css" />
    <link rel="stylesheet" href="../popup.css" />
    <link rel="stylesheet" href="../../cover/style.css" />
    <style type="text/css">
        @font-face {
            font-family: "NewYork";
            src: url("/coding/fontbook/NewYork.otf");
        }
        
        #title {
            font-family: "NewYork";
        }
        
        #mobile {
            display: none;
        }
        
        @media screen and (max-width: 900px) {
            #left #css_library,
            #left #demo,
            #right {
                display: none;
            }
            #mobile {
                display: block;
                position: fixed;
                padding: 0;
                margin: 0;
                width: 100%;
                height: 100vh;
                top: 0;
                left: 0;
            }
        }
    </style>
</head>

<body>
    <h1 id="title">Font | Cascading Style Sheets</h1>
    <div id="cover">
        <div id="left">
            <div id="demo"></div>
            <div id="css_library"></div>
            <div id="mobile"></div>
            <br/>
        </div>
        <div id="right">
            <div id="howto"></div>
            <div id="contents">
                <p class="support">Support
                    <a onclick="obj=document.getElementById('support').style; obj.display=(obj.display=='none')?'block':'none';">Donation</a>
                </p>
                <br/>
            </div>
        </div>
    </div>
    <div class="popup" id="support" style="display:none;">
        <p><iframe src="/support/"></iframe></p>
        <span class="close" onclick="obj=document.getElementById('support').style; obj.display=(obj.display=='none')?'block':'none';">✕</span>
    </div>
</body>

</html>
