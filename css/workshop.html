<style type="text/css">
    #hello p {zoom:0.75;}
    #hello p span {
      zoom:0.5;
      display:block;
      border:1px solid;
      margin:2.5vw 0;
      line-height:200%;
      padding:2.5vw;
      width:90%;
  }
.back {
  font-size:1.25vw;
  padding:0; margin:0;
}
.back a {
  text-decoration:none;
  color:#000;
  cursor:pointer;
  padding:0.5vw 1.5vw;
  line-height:4vw;
  border:0.1vw solid;
  border-radius:2.5rem;
}
</style>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
<script type="text/javascript">
$(function() {
  $('a').hover(function() {
	  $(this).css({'background':getRumRgba()});
  }, function() {
	  $(this).css({'background':''});
  });
});
</script>
