<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title> This Page can or cannot be browse from You </title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="../js/randomcolor.js"></script>
    <script type="text/javascript">
        $(function() {
            jQuery('#right').css({
                'background': getRumRgba()
            });
        });

        $(function() {
            $("#canbe").load("../mobile/canbe.html");
            $("#about").load("../mobile/about.html");
            $("#mobile").load("../mobile.html");
            $("#order").load("../submit/order/form.html");
        })
    </script>
    <link rel="stylesheet" href="../cover/style.css" />
    <link rel="stylesheet" href="../css/popup.css" />
    <style type="text/css">
        @font-face {
            font-family: "NewYork";
            src: url("/coding/fontbook/NewYork.otf");
        }
        
        #title {
            font-family: "NewYork";
        }
        
        #left {
            overflow-x: hidden;
        }
        
        @media screen and (max-width: 900px) {
            #left #canbe,
            #right #about {
                display: none;
            }
        }
    </style>
</head>

<body>
    <h1 id="title">This Page can or cannot be browse from You</h1>
    <div id="cover">
        <div id="left">
            <div id="canbe"></div>
            <div id="mobile"></div>
        </div>
        <div id="right">
            <div id="about"></div>
            <div id="order"></div>
        </div>
    </div>

    <div class="popup" id="contactform" style="display:none;">
        <p><iframe src="../submit/order/"></iframe></p>
        <span class="close" onclick="obj=document.getElementById('contactform').style; obj.display=(obj.display=='none')?'block':'none';">✕</span>
    </div>
    <div class="popup" id="support" style="display:none;">
        <p><iframe src="/support/"></iframe></p>
        <span class="close" onclick="obj=document.getElementById('support').style; obj.display=(obj.display=='none')?'block':'none';">✕</span>
    </div>
</body>

</html>
